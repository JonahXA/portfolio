<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>American Psycho — Jonah</title>
  <meta name="description" content="An essay on American Psycho by Jonah.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="web.css">
  <style>
    .essay-hero {
      padding: 140px 0 64px;
      border-bottom: 1px solid var(--border);
    }

    .essay-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-3);
      margin-bottom: 40px;
      transition: color var(--t);
    }

    .essay-back:hover { color: var(--text); }

    .essay-back svg { width: 14px; height: 14px; }

    .essay-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 18px;
    }

    .essay-title {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.0;
      color: var(--text);
      margin-bottom: 0;
    }

    .essay-body {
      max-width: 680px;
      margin: 0 auto;
      padding: var(--sec) 0;
    }

    #pdf-viewer canvas {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    .essay-loading {
      padding: 80px 0;
      text-align: center;
      color: var(--text-3);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Jonah</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="blog.html" class="active">Thoughts &amp; Books</a></li>
        <li><a href="sprout.html">Sprout</a></li>
        <li><a href="contact.html" class="btn btn-outline" style="padding: 8px 20px; font-size: 13px;">Get in touch</a></li>
      </ul>
    </div>
  </nav>

  <!-- ESSAY HERO -->
  <div class="essay-hero">
    <div class="container">
      <a href="blog.html" class="essay-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Thoughts &amp; Books
      </a>
      <div class="essay-label">Essay</div>
      <h1 class="essay-title">American Psycho</h1>
    </div>
  </div>

  <!-- ESSAY CONTENT -->
  <div class="container">
    <div class="essay-body">
      <div id="pdf-viewer">
        <div class="essay-loading">Loading essay…</div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <span class="footer-copy">© 2025 Jonah. All rights reserved.</span>
        <ul class="footer-links">
          <li><a href="projects.html">Projects</a></li>
          <li><a href="blog.html">Thoughts &amp; Books</a></li>
        </ul>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const viewer = document.getElementById('pdf-viewer');
    const loadingTask = pdfjsLib.getDocument('american-psycho.pdf');

    loadingTask.promise.then(function(pdf) {
      viewer.innerHTML = '';
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        pdf.getPage(pageNum).then(function(page) {
          const scale = 1.8;
          const viewport = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          viewer.appendChild(canvas);
          page.render({ canvasContext: canvas.getContext('2d'), viewport });
        });
      }
    }).catch(function() {
      viewer.innerHTML = '<p style="color: var(--text-3); font-size: 14px; padding: 80px 0; text-align: center;">Essay coming soon.</p>';
    });
  </script>
</body>
</html>
