<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Jonah</title>
  <meta name="description" content="Get in touch with Jonah.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="web.css">
  <style>
    .contact-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 0 80px;
    }

    .contact-page-headline {
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 700;
      letter-spacing: -0.045em;
      line-height: 0.95;
      color: var(--text);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.05s forwards;
    }

    .contact-page-sub {
      font-size: clamp(1rem, 2vw, 1.125rem);
      color: var(--text-2);
      margin-bottom: 72px;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.15s forwards;
    }

    .contact-links-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.25s forwards;
    }

    .contact-link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      transition: opacity var(--t);
    }

    .contact-links-list .contact-link-row:first-child {
      border-top: 1px solid var(--border);
    }

    .contact-link-row:hover {
      opacity: 0.6;
    }

    .contact-link-row:hover .contact-link-arrow {
      transform: translateX(5px);
      color: var(--text);
    }

    .contact-link-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .contact-link-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--bg-alt);
      border: 1px solid var(--border-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-link-icon svg {
      width: 20px;
      height: 20px;
      color: var(--text-2);
    }

    .contact-link-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 4px;
    }

    .contact-link-value {
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .contact-link-arrow {
      color: var(--text-3);
      transition: transform var(--t) var(--ease), color var(--t);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
